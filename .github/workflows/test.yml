name: Run Tests

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t fastapi-app:test .

    - name: Run black in container
      run: |
        docker run --rm \
          -e PYTHONPATH=/app \
          fastapi-app:test \
          black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint # current job will not run if it the lint job does not pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t fastapi-app:test .
    
    - name: Run pytest in container
      run: |
        docker run --rm \
          -e PYTHONPATH=/app \
          fastapi-app:test \
          pytest -v --tb=short --color=yes tests/